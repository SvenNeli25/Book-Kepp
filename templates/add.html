{% extends "base.html" %}
{% block title %}Dodaj - Book-Keep{% endblock %}

{% block content %}
  <h1 class="page-title">Dodaj</h1>

  <form class="form" method="POST" enctype="multipart/form-data" data-entry-form>
    <div class="form__grid">
      <label class="field">
        <span class="field__label">Naslov</span>
        <input class="input" name="naslov" required placeholder="Naslov">
      </label>

      <label class="field">
        <span class="field__label">Avtor</span>
        <input class="input" name="avtor" required placeholder="Avtor">
      </label>

      <label class="field">
        <span class="field__label">Tip</span>
        <select class="select" name="tip" data-tip>
          <option value="book">Knjiga</option>
          <option value="audiobook">Avdioknjiga</option>
        </select>
      </label>

      <label class="field">
        <span class="field__label">Zvrst</span>
        <select class="select" name="zvrst">
          {% for g in ['Fantazija','Znanstvena fantastika','Romanca','Kriminalka','Triler','Grozljivka','Avantura','Zgodovinski roman','Mladinski roman','Realisticni roman','Self-Help','Drugo'] %}
            <option value="{{ g }}" {% if g == 'Drugo' %}selected{% endif %}>{{ g }}</option>
          {% endfor %}
        </select>
      </label>

      <label class="field field--wide">
        <span class="field__label">Slika naslovnice (nalozi datoteko)</span>
        <input class="input" name="cover_file" type="file" accept="image/*">
      </label>

      <label class="field field--wide">
        <span class="field__label">Slika naslovnice (URL, opcijsko)</span>
        <input class="input" name="slika_naslovnice" placeholder="https://...">
      </label>

      <label class="field field--wide">
        <span class="field__label">Kratko mnenje</span>
        <textarea class="textarea" name="kratko_mnenje" rows="3" placeholder="Kratek opis / vtis"></textarea>
      </label>

      <label class="field field--wide">
        <span class="field__label">Priljubljeni citat</span>
        <textarea class="textarea" name="fav_quote" rows="2" placeholder="Citat"></textarea>
      </label>

      <label class="field field--wide">
        <span class="field__label">Opombe</span>
        <textarea class="textarea" name="opombe" rows="4" placeholder="Opombe"></textarea>
      </label>
    </div>

    <section class="panel">
      <h2 class="panel__title">Dolzina</h2>
      <div class="panel__grid">
        <label class="field" data-only="book">
          <span class="field__label">Stevilo strani</span>
          <input class="input" name="st_strani" type="number" min="1" step="1" inputmode="numeric" placeholder="npr. 320">
        </label>
      </div>
      <p class="hint">Stevilo strani je relevantno samo za knjige.</p>
    </section>

    <section class="panel">
      <h2 class="panel__title">Rating</h2>
      <p class="hint">Najprej dodaj vnos kot In progress. Ko zakljucis, ga ocenis na strani vnos-a (Finish).</p>
    </section>

    <div class="form__actions">
      <button class="btn" type="submit">Dodaj</button>
      <a class="btn btn--ghost" href="{{ url_for('index') }}">Prekliči</a>
    </div>
  </form>
{% endblock %}
